
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루빅스 큐브 연습</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');
  :root {
    --bg: #0f1923; --panel: #1a2636; --panel2: #223048;
    --accent: #f5a623; --teacher: #4fc3f7; --student: #81c784;
    --text: #e8edf2; --muted: #7a90a8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nanum Gothic',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

  header { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; background:var(--panel); border-bottom:2px solid #263c55; }
  .logo { font-size:22px; font-weight:800; color:var(--accent); }
  .role-badge { display:flex; gap:10px; }
  .role-btn { padding:8px 20px; border-radius:30px; border:2px solid transparent; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s; background:var(--panel2); color:var(--muted); }
  .role-btn.active-teacher { border-color:var(--teacher); color:var(--teacher); background:rgba(79,195,247,0.1); }
  .role-btn.active-student { border-color:var(--student); color:var(--student); background:rgba(129,199,132,0.1); }

  .main { display:flex; flex:1; overflow:hidden; }
  .cube-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:30px 24px 24px; gap:14px; overflow-y:auto; }

  #threeCanvas { border-radius:16px; cursor:grab; display:block; flex-shrink:0; }
  #threeCanvas:active { cursor:grabbing; }

  /* 큐브 레이아웃 */
  .cube-layout { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .cube-row { display:flex; align-items:center; justify-content:center; gap:6px; }
  .top-row, .bot-row { width:100%; }
  .face-btns-top, .face-btns-bot { display:flex; gap:4px; justify-content:center; flex:1; }
  .pos-btn-top, .pos-btn-bot { display:flex; justify-content:center; }
  .side-col { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .mid-row { align-items:center; }

  .view-controls { display:flex; justify-content:center; }
  .view-cross { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .view-cross-row { display:flex; align-items:center; gap:4px; }
  .view-cross-center { width:44px; height:44px; }
  .view-btn { width:44px; height:44px; border-radius:8px; border:2px solid #4a6278; background:var(--panel2); color:var(--text); font-size:18px; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
  .view-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(245,166,35,0.1); }

  .controls { display:flex; flex-direction:column; gap:10px; width:100%; max-width:340px; }
  .ctrl-label { font-size:14px; color:var(--muted); font-weight:700; text-align:center; }
  .ctrl-btn { padding:10px 6px; border-radius:10px; border:none; font-size:15px; font-weight:800; cursor:pointer; font-family:inherit; transition:all 0.15s; background:var(--panel2); color:var(--text); }
  .ctrl-btn:hover { background:var(--accent); color:#000; transform:scale(1.05); }
  .action-row { display:flex; gap:8px; justify-content:center; }
  .act-btn { padding:10px 18px; border-radius:10px; border:none; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.15s; }
  .act-btn:hover { transform:scale(1.04); }
  .btn-scramble { background:#ff7043; color:#fff; }
  .btn-reset { background:var(--panel2); color:var(--text); border:2px solid #4a6278; }
  .btn-undo { background:var(--panel2); color:var(--accent); border:2px solid var(--accent); }
  .btn-hint-show { background:var(--accent); color:#000; }
  .lock-notice { font-size:13px; color:var(--muted); text-align:center; padding:4px 0; }
  .ctrl-btn.btn-flash-teacher {
    animation: flashTeacher 0.4s ease;
  }
  .ctrl-btn.btn-flash-student {
    animation: flashStudent 0.4s ease;
  }
  @keyframes flashTeacher {
    0%   { background: var(--panel2); transform: scale(1); }
    40%  { background: var(--teacher); color: #000; transform: scale(1.15); box-shadow: 0 0 12px var(--teacher); }
    100% { background: var(--panel2); transform: scale(1); }
  }
  @keyframes flashStudent {
    0%   { background: var(--panel2); transform: scale(1); }
    40%  { background: var(--student); color: #000; transform: scale(1.15); box-shadow: 0 0 12px var(--student); }
    100% { background: var(--panel2); transform: scale(1); }
  }
  .operator-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 800;
    text-align: center;
    transition: all 0.3s;
  }
  .operator-badge.teacher { background: rgba(79,195,247,0.15); border: 2px solid var(--teacher); color: var(--teacher); }
  .operator-badge.student { background: rgba(129,199,132,0.15); border: 2px solid var(--student); color: var(--student); }
  .operator-badge.none    { background: transparent; border: 2px solid transparent; color: transparent; }


  .side-panel { width:280px; background:var(--panel); border-left:2px solid #263c55; display:flex; flex-direction:column; overflow-y:auto; }
  .panel-section { padding:18px 20px; border-bottom:1px solid #263c55; }
  .panel-title { font-size:14px; font-weight:800; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
  .msg-box { border-radius:10px; padding:12px 14px; font-size:15px; font-weight:700; line-height:1.6; }
  .msg-teacher { background:rgba(79,195,247,0.1); border:2px solid var(--teacher); color:var(--teacher); }
  .msg-student { background:rgba(129,199,132,0.1); border:2px solid var(--student); color:var(--student); }
  .msg-info { background:rgba(245,166,35,0.1); border:2px solid var(--accent); color:var(--accent); }
  .step-list { display:flex; flex-direction:column; gap:8px; }
  .step-item { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:10px; background:var(--panel2); border:2px solid transparent; cursor:pointer; transition:all 0.2s; }
  .step-item.active { border-color:var(--accent); background:rgba(245,166,35,0.08); }
  .step-item.done { border-color:var(--student); opacity:0.7; }
  .step-num { width:26px; height:26px; border-radius:50%; background:var(--panel); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:var(--muted); flex-shrink:0; }
  .step-item.active .step-num { background:var(--accent); color:#000; }
  .step-item.done .step-num { background:var(--student); color:#000; }
  .step-text { font-size:15px; font-weight:700; color:var(--text); line-height:1.4; }
  .step-sub { font-size:13px; color:var(--muted); margin-top:2px; }
  .move-log { display:flex; flex-wrap:wrap; gap:5px; max-height:100px; overflow-y:auto; }
  .move-tag { background:var(--panel2); border-radius:6px; padding:3px 10px; font-size:13px; font-weight:700; color:var(--text); }
  .move-tag.teacher-move { color:var(--teacher); border:1px solid var(--teacher); }
  .move-tag.student-move { color:var(--student); border:1px solid var(--student); }

  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; align-items:center; justify-content:center; }
  .overlay.show { display:flex; }
  .overlay-box { background:var(--panel); border:3px solid var(--accent); border-radius:20px; padding:40px 50px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:16px; }
  .overlay-emoji { font-size:64px; }
  .overlay-title { font-size:32px; font-weight:800; color:var(--accent); }
  .overlay-sub { font-size:18px; color:var(--muted); }
  .overlay-btn { padding:12px 32px; border-radius:30px; border:none; background:var(--accent); color:#000; font-size:18px; font-weight:800; cursor:pointer; font-family:inherit; margin-top:8px; }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const FACE_COLORS = {
  F: 0xf5f5f5, B: 0xFFD600, U: 0x43A047,
  D: 0x1565C0, R: 0xFB8C00, L: 0xE53935,
};
const BLACK = 0x1a1a1a;
const CUBIE_SIZE = 0.93;
const GAP = 1.0;

const canvas = document.getElementById('threeCanvas');
const W = 420, H = 360;
canvas.width = W; canvas.height = H;

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setSize(W, H);
renderer.setPixelRatio(window.devicePixelRatio);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f1923);

const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
camera.position.set(0, 0, 7);

scene.add(new THREE.DirectionalLight(0xffffff, 0.9).position.set(5,8,5) && new THREE.DirectionalLight(0xffffff, 0.9));
// 조명 최소화 - 색상 왜곡 방지
scene.add(new THREE.AmbientLight(0xffffff, 1.0));

const cubeGroup = new THREE.Group();
scene.add(cubeGroup);
cubeGroup.rotation.x = 0.3840;
cubeGroup.rotation.y = 1.0472;

let cubies = [];



function makeCubie(px, py, pz) {
  const geo = new THREE.BoxGeometry(CUBIE_SIZE, CUBIE_SIZE, CUBIE_SIZE);
  const mats = [
    new THREE.MeshBasicMaterial({ color: px === 1  ? FACE_COLORS.R : BLACK, side: THREE.DoubleSide }),
    new THREE.MeshBasicMaterial({ color: px === -1 ? FACE_COLORS.L : BLACK, side: THREE.DoubleSide }),
    new THREE.MeshBasicMaterial({ color: py === 1  ? FACE_COLORS.U : BLACK, side: THREE.DoubleSide }),
    new THREE.MeshBasicMaterial({ color: py === -1 ? FACE_COLORS.D : BLACK, side: THREE.DoubleSide }),
    new THREE.MeshBasicMaterial({ color: pz === 1  ? FACE_COLORS.F : BLACK, side: THREE.DoubleSide }),
    new THREE.MeshBasicMaterial({ color: pz === -1 ? FACE_COLORS.B : BLACK, side: THREE.DoubleSide }),
  ];
  const mesh = new THREE.Mesh(geo, mats);
  mesh.position.set(px * GAP, py * GAP, pz * GAP);
  cubeGroup.add(mesh);
  return { mesh, pos: { x:px, y:py, z:pz } };
}

function buildCube() {
  cubies.forEach(c => cubeGroup.remove(c.mesh));
  cubies = [];
  for (let x=-1; x<=1; x++)
    for (let y=-1; y<=1; y++)
      for (let z=-1; z<=1; z++)
        cubies.push(makeCubie(x, y, z));
}
buildCube();

// ── 렌더 루프 ──
function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
animate();

// 초기 면 버튼/안내 업데이트 (모든 함수 정의 후)
setTimeout(() => { orientation = getOrientationFromAngles(baseRotX, baseRotY); updateFaceButtons(); }, 0);

// ── 드래그 (손 떼면 복귀) ──
let baseRotX = 0.3840, baseRotY = 1.0472;
let tempRotX = 0, tempRotY = 0;
let dragging = false, lastX, lastY;

canvas.addEventListener('mousedown', e => { dragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tempRotY += (e.clientX - lastX) * 0.012;
  tempRotX += (e.clientY - lastY) * 0.012;
  lastX=e.clientX; lastY=e.clientY;
  cubeGroup.rotation.x = baseRotX + tempRotX;
  cubeGroup.rotation.y = baseRotY + tempRotY;
  if (window._pushView) window._pushView(cubeGroup.rotation.x, cubeGroup.rotation.y);
});
window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  const sx=cubeGroup.rotation.x, sy=cubeGroup.rotation.y, t0=performance.now();
  function ret(now) {
    const t=Math.min((now-t0)/250,1), e=1-Math.pow(1-t,3);
    cubeGroup.rotation.x=sx+(baseRotX-sx)*e; cubeGroup.rotation.y=sy+(baseRotY-sy)*e;
    if(t<1) requestAnimationFrame(ret);
    else {
      tempRotX=0; tempRotY=0;
      if (window._pushView) window._pushView(baseRotX, baseRotY);
    }
  }
  requestAnimationFrame(ret);
});
canvas.addEventListener('touchstart', e=>{ const t=e.touches[0]; dragging=true; lastX=t.clientX; lastY=t.clientY; },{passive:true});
window.addEventListener('touchmove', e=>{
  if(!dragging) return;
  const t=e.touches[0];
  tempRotY+=(t.clientX-lastX)*0.012; tempRotX+=(t.clientY-lastY)*0.012;
  lastX=t.clientX; lastY=t.clientY;
  cubeGroup.rotation.x=baseRotX+tempRotX; cubeGroup.rotation.y=baseRotY+tempRotY;
  if (window._pushView) window._pushView(cubeGroup.rotation.x, cubeGroup.rotation.y);
},{passive:true});
window.addEventListener('touchend', ()=>{
  if(!dragging) return;
  dragging=false;
  const sx=cubeGroup.rotation.x,sy=cubeGroup.rotation.y,t0=performance.now();
  function ret(now){const t=Math.min((now-t0)/250,1),e=1-Math.pow(1-t,3);cubeGroup.rotation.x=sx+(baseRotX-sx)*e;cubeGroup.rotation.y=sy+(baseRotY-sy)*e;if(t<1)requestAnimationFrame(ret);else{tempRotX=0;tempRotY=0;}}
  requestAnimationFrame(ret);
});

// ── 뷰 버튼 (부드러운 모션 + 앞면 색상 업데이트) ──
// ── 면 매핑 시스템 ──
// 논리 좌표 고정: +z=흰(F), -z=노랑(B), +y=초록(U), -y=파랑(D), +x=주황(R), -x=빨강(L)
const ORIENT_TABLE = [
  {front:'F',back:'B',up:'L',down:'R',right:'U',left:'D'},
  {front:'F',back:'B',up:'D',down:'U',right:'L',left:'R'},
  {front:'F',back:'B',up:'R',down:'L',right:'D',left:'U'},
  {front:'F',back:'B',up:'U',down:'D',right:'R',left:'L'},
  {front:'L',back:'R',up:'U',down:'D',right:'F',left:'B'},
  {front:'L',back:'R',up:'B',down:'F',right:'U',left:'D'},
  {front:'L',back:'R',up:'D',down:'U',right:'B',left:'F'},
  {front:'L',back:'R',up:'F',down:'B',right:'D',left:'U'},
  {front:'U',back:'D',up:'F',down:'B',right:'L',left:'R'},
  {front:'U',back:'D',up:'R',down:'L',right:'F',left:'B'},
  {front:'U',back:'D',up:'B',down:'F',right:'R',left:'L'},
  {front:'U',back:'D',up:'L',down:'R',right:'B',left:'F'},
  {front:'R',back:'L',up:'U',down:'D',right:'B',left:'F'},
  {front:'R',back:'L',up:'F',down:'B',right:'U',left:'D'},
  {front:'R',back:'L',up:'D',down:'U',right:'F',left:'B'},
  {front:'R',back:'L',up:'B',down:'F',right:'D',left:'U'},
  {front:'B',back:'F',up:'D',down:'U',right:'R',left:'L'},
  {front:'B',back:'F',up:'L',down:'R',right:'D',left:'U'},
  {front:'B',back:'F',up:'U',down:'D',right:'L',left:'R'},
  {front:'B',back:'F',up:'R',down:'L',right:'U',left:'D'},
  {front:'D',back:'U',up:'R',down:'L',right:'B',left:'F'},
  {front:'D',back:'U',up:'F',down:'B',right:'R',left:'L'},
  {front:'D',back:'U',up:'L',down:'R',right:'F',left:'B'},
  {front:'D',back:'U',up:'B',down:'F',right:'L',left:'R'},
];

function findOrientIndex(o) {
  return ORIENT_TABLE.findIndex(t =>
    t.front === o.front && t.up === o.up && t.right === o.right
  );
}

function getNextOrientation(o, dy, dx) {
  // 현재 orientation에서 회전 후 다음 orientation 찾기
  // Y축 우회전(dy=90): front→right, right→back, back→left, left→front, up/down 유지
  // Y축 좌회전(dy=-90): front→left, left→back, back→right, right→front
  // X축 위로(dx=-90): front→up, up→back, back→down, down→front, left/right 유지
  // X축 아래로(dx=90): front→down, down→back, back→up, up→front
  let n = {...o};
  if (dy === 90) {
    n.front=o.left; n.right=o.front; n.back=o.right; n.left=o.back;
  } else if (dy === -90) {
    n.front=o.right; n.left=o.front; n.back=o.left; n.right=o.back;
  } else if (dx === -90) {
    n.front=o.up; n.up=o.back; n.back=o.down; n.down=o.front;
  } else if (dx === 90) {
    n.front=o.down; n.down=o.back; n.back=o.up; n.up=o.front;
  }
  // 테이블에서 찾기
  const idx = findOrientIndex(n);
  return idx >= 0 ? ORIENT_TABLE[idx] : n;
}

let orientation = ORIENT_TABLE[3]; // 4번: U=초록, F=흰색, R=주황, L=빨강 // 초기: 1번 (U=빨강, F=흰색, R=초록)
// accumY를 초기 각도에 맞게 설정 (-40도에서 시작)

const COLOR_NAME = {
  F:'흰색', B:'노란색', U:'초록색', D:'파란색', R:'주황색', L:'빨간색'
};
const COLOR_EMOJI = {
  F:'⬜', B:'🟨', U:'🟩', D:'🟦', R:'🟧', L:'🟥'
};

// 현재 orientation 기준으로 버튼 라벨→실제 논리 면 매핑
function mapFace(viewFace) {
  const map = {
    'F': orientation.front,
    'B': orientation.back,
    'U': orientation.up,
    'D': orientation.down,
    'R': orientation.right,
    'L': orientation.left,
  };
  return map[viewFace] || viewFace;
}

// 포지션에 따른 orientation 결정
// baseRotY 기준 (라디안): 어떤 면이 앞으로 오는지
// Y축 양수 = 오른쪽으로 회전 → 왼면이 앞으로
function getOrientationFromAngles(rx, ry) {
  const PI2 = Math.PI * 2;
  const HPI = Math.PI / 2;

  // 정규화 (0~2π)
  const ny = ((ry % PI2) + PI2) % PI2;
  const nx = ((rx % PI2) + PI2) % PI2;

  // Y축 snap: ry=0→F앞, ry=π/2→L앞, ry=π→B앞, ry=3π/2→R앞
  const ySnap = Math.round(ny / HPI) % 4;
  const Y_FRONT = ['F','L','B','R'];
  const yFront = Y_FRONT[ySnap];

  // X축 snap: rx=0→F앞/U위, rx=π/2→D앞/F위, rx=π→B앞/D위, rx=3π/2→U앞/B위
  const xSnap = Math.round(nx / HPI) % 4;

  const OPP = {F:'B',B:'F',U:'D',D:'U',R:'L',L:'R'};

  let front, up;
  if (xSnap === 0) { front = yFront;           up = 'U'; }
  else if (xSnap === 1) { front = 'U';         up = OPP[yFront]; }
  else if (xSnap === 2) { front = OPP[yFront]; up = 'D'; }
  else                  { front = 'D';         up = yFront; }

  // right: Y축 기준 (F→R, L→F, B→L, R→B)
  const Y_RIGHT = {F:'R',L:'F',B:'L',R:'B'};
  const right = Y_RIGHT[yFront];
  const left  = OPP[right];
  const back  = OPP[front];
  const down  = OPP[up];

  return { front, back, up, down, right, left };
}

function rotateView(dy, dx) {
  const fx = cubeGroup.rotation.x, fy = cubeGroup.rotation.y;
  baseRotX += dx * Math.PI / 180;
  baseRotY += dy * Math.PI / 180;

  // 각도 기반으로 orientation 직접 계산
  orientation = getOrientationFromAngles(baseRotX, baseRotY);
  updateFaceButtons();

  const tx = baseRotX, ty = baseRotY, t0 = performance.now();
  function step(now) {
    const t = Math.min((now - t0) / 350, 1), e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    cubeGroup.rotation.x = fx + (tx - fx) * e;
    cubeGroup.rotation.y = fy + (ty - fy) * e;
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── 면 회전 (애니메이션) ──
const FACE_DEF = {
  U:{axis:'y',layer:1, sign:-1}, D:{axis:'y',layer:-1,sign:1},
  F:{axis:'z',layer:1, sign:-1}, B:{axis:'z',layer:-1,sign:1},
  R:{axis:'x',layer:1, sign:-1}, L:{axis:'x',layer:-1,sign:1},
};
const ANIM_DUR = 220;
let animating = false;
let animQueue = [];

function getCubiesOnFace(face) {
  const {axis,layer} = FACE_DEF[face];
  return cubies.filter(c => Math.round(c.pos[axis]) === layer);
}

function animateRotation(face, dir, callback) {
  if (animating) { animQueue.push({face,dir,callback}); return; }
  animating = true;
  const def = FACE_DEF[face];
  const affected = getCubiesOnFace(face);
  const pivot = new THREE.Group();
  cubeGroup.add(pivot);
  affected.forEach(c => { cubeGroup.remove(c.mesh); pivot.add(c.mesh); });
  const angle = (Math.PI/2) * dir * def.sign;
  const t0 = performance.now();
  function step(now) {
    const t = Math.min((now-t0)/ANIM_DUR, 1);
    const e = t<0.5 ? 2*t*t : -1+(4-2*t)*t;
    pivot.rotation[def.axis] = angle*e;
    if (t < 1) { requestAnimationFrame(step); return; }
    pivot.rotation[def.axis] = angle;
    affected.forEach(c => {
      pivot.remove(c.mesh);
      updateCubiePos(c, face, dir);
      c.mesh.position.set(c.pos.x*GAP, c.pos.y*GAP, c.pos.z*GAP);
      c.mesh.rotation.set(0,0,0);
      cubeGroup.add(c.mesh);
    });
    cubeGroup.remove(pivot);
    animating = false;
    if (callback) callback();
    if (animQueue.length > 0) { const n=animQueue.shift(); animateRotation(n.face,n.dir,n.callback); }
  }
  requestAnimationFrame(step);
}

function updateCubiePos(cubie, face, dir) {
  const {axis,sign} = FACE_DEF[face];
  const d = dir * sign;
  const {x,y,z} = cubie.pos;
  let nx=x, ny=y, nz=z;
  if (axis==='y') { if(d>0){nx=z;nz=-x;}else{nx=-z;nz=x;} }
  else if (axis==='x') { if(d>0){ny=-z;nz=y;}else{ny=z;nz=-y;} }
  else { if(d>0){nx=y;ny=-x;}else{nx=-y;ny=x;} }
  cubie.pos = {x:Math.round(nx),y:Math.round(ny),z:Math.round(nz)};
  rotateMaterials(cubie, axis, d);
}

function rotateMaterials(cubie, axis, d) {
  const cols = cubie.mesh.material.map(m => m.color.getHex());
  if (axis==='y') {
    if(d>0){cubie.mesh.material[0].color.setHex(cols[4]);cubie.mesh.material[5].color.setHex(cols[0]);cubie.mesh.material[1].color.setHex(cols[5]);cubie.mesh.material[4].color.setHex(cols[1]);}
    else{cubie.mesh.material[0].color.setHex(cols[5]);cubie.mesh.material[4].color.setHex(cols[0]);cubie.mesh.material[1].color.setHex(cols[4]);cubie.mesh.material[5].color.setHex(cols[1]);}
  } else if (axis==='x') {
    if(d>0){cubie.mesh.material[2].color.setHex(cols[5]);cubie.mesh.material[4].color.setHex(cols[2]);cubie.mesh.material[3].color.setHex(cols[4]);cubie.mesh.material[5].color.setHex(cols[3]);}
    else{cubie.mesh.material[2].color.setHex(cols[4]);cubie.mesh.material[5].color.setHex(cols[2]);cubie.mesh.material[3].color.setHex(cols[5]);cubie.mesh.material[4].color.setHex(cols[3]);}
  } else {
    if(d>0){cubie.mesh.material[0].color.setHex(cols[2]);cubie.mesh.material[3].color.setHex(cols[0]);cubie.mesh.material[1].color.setHex(cols[3]);cubie.mesh.material[2].color.setHex(cols[1]);}
    else{cubie.mesh.material[0].color.setHex(cols[3]);cubie.mesh.material[2].color.setHex(cols[0]);cubie.mesh.material[1].color.setHex(cols[2]);cubie.mesh.material[3].color.setHex(cols[1]);}
  }
}

function rotateFace(face, dir) {
  moveHistory.push({face,dir});

}

// 버튼 플래시 효과
// 논리 면 → 버튼 id 매핑 (현재 orientation 기준으로 역방향 찾기)
function getViewFaceFromLogic(logicFace) {
  // orientation에서 logicFace가 어느 방향(F/U/R/L/B/D)에 있는지 찾기
  const o = orientation;
  if (o.front === logicFace) return 'F';
  if (o.up    === logicFace) return 'U';
  if (o.right === logicFace) return 'R';
  if (o.left  === logicFace) return 'L';
  if (o.back  === logicFace) return 'B';
  if (o.down  === logicFace) return 'D';
  return null;
}

function flashButton(face, dir, role) {
  // face는 실제 논리 면 → 현재 orientation에서 어떤 버튼 위치인지 역산
  const viewFace = getViewFaceFromLogic(face);
  if (!viewFace) return;

function scrambleCube() {
  if (currentRole!=='teacher') { alert('강사만 섞기를 할 수 있어요!'); return; }
  buildCube(); moveHistory=[]; animQueue=[]; animating=false;
  const faces=['U','D','F','B','R','L'], dirs=[1,-1], moves=[];
  for(let i=0;i<18;i++) moves.push({face:faces[Math.floor(Math.random()*6)],dir:dirs[Math.floor(Math.random()*2)]});
  function doNext(i) {
    if(i>=moves.length){
      isScrambled=true;
      document.getElementById('move-log').innerHTML='<span style="color:var(--muted);font-size:13px;">섞기 완료!</span>';
      setStep(0); updateMsg('학생에게 큐브를 넘겨주세요! 단계별로 같이 맞춰봐요.','teacher'); return;
    }
    animateRotation(moves[i].face,moves[i].dir,()=>doNext(i+1));
  }
  doNext(0);
}

function undoMove() {
  if(moveHistory.length===0) return;
  const last=moveHistory.pop();
  animateRotation(last.face,-last.dir,null);
}

function resetCube() {
  isScrambled=false; animQueue=[]; animating=false;
  buildCube(); moveHistory=[];
  document.getElementById('move-log').innerHTML='<span style="color:var(--muted);font-size:13px;">아직 이동 없음</span>';
  setStep(0); updateMsg('🎯 강사가 큐브를 섞어서 문제를 만들어 주세요!','teacher');
}

function checkSolved() {
  if (!isScrambled) return;
  const faceChecks = {
    U:{axis:'y',layer:1, matIdx:2}, D:{axis:'y',layer:-1,matIdx:3},
    F:{axis:'z',layer:1, matIdx:4}, B:{axis:'z',layer:-1,matIdx:5},
    R:{axis:'x',layer:1, matIdx:0}, L:{axis:'x',layer:-1,matIdx:1},
  };
  for (const face in faceChecks) {
    const {axis,layer,matIdx}=faceChecks[face];
    const fc=cubies.filter(c=>Math.round(c.pos[axis])===layer);
    const colors=fc.map(c=>c.mesh.material[matIdx].color.getHex());
    if(!colors.every(col=>col===colors[0]&&col!==BLACK)) return;
  }
  isScrambled=false;
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('show'); }

function setRole(role) {
  currentRole=role;
  document.getElementById('btn-teacher').className='role-btn'+(role==='teacher'?' active-teacher':'');
  document.getElementById('btn-student').className='role-btn'+(role==='student'?' active-student':'');
  const notice=document.getElementById('lock-notice');
  if(role==='student'){
    notice.textContent='학생 모드: 섞기는 강사만 할 수 있어요';
    notice.style.color='var(--student)';
    updateMsg('선생님이 만든 큐브를 맞춰봐요! 모르면 💡 힌트를 눌러요.','student');
    document.getElementById('permission-panel').style.display='none';
  } else {
    notice.textContent='강사 모드: 모든 기능 사용 가능';
    notice.style.color='var(--teacher)';
    updateMsg('강사 모드예요. 섞기로 문제를 만들거나 학생과 함께 풀어봐요.','teacher');
    document.getElementById('permission-panel').style.display='block';
  }
  applyBlockOverlay();
}

const stepMsgs=[
  {t:'💡 앞면(F)에 흰색 십자(+)를 만들어요.',role:'info'},
  {t:'✨ 앞면 9칸을 모두 흰색으로 만들어봐요!',role:'info'},
  {t:'🔄 가운데 줄 4면을 맞춰요.',role:'info'},
  {t:'⭐ 뒷면(B)에 노란색 십자를 만들어봐요!',role:'info'},
  {t:'🎉 마지막! 모든 면을 완성해봐요!',role:'info'},
];
function gotoStep(n){setStep(n);updateMsg(stepMsgs[n].t,stepMsgs[n].role);}
function setStep(n){
  currentStep=n;
  document.getElementById('step-info').textContent=(n+1)+'단계 진행 중';
  for(let i=0;i<5;i++){const el=document.getElementById('step-'+i);el.className='step-item'+(i===n?' active':i<n?' done':'');}
}
function updateMsg(msg,role){const el=document.getElementById('current-msg');el.textContent=msg;el.className='msg-box msg-'+role;}
function toggleHint() {
  const section = document.getElementById('hint-section');
  const msg = document.getElementById('hint-msg');
  const isOpen = section.style.display !== 'none';
  if (isOpen) {
    section.style.display = 'none';
  } else {
    msg.textContent = stepMsgs[currentStep].t;
    section.style.display = 'block';
    // 스크롤을 힌트 섹션으로 이동
    section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}
function closeHint() {
  document.getElementById('hint-section').style.display = 'none';
}
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:"AIzaSyD6luoE1TUQe-zGWl_bM6ujCFGAL-MtK6o",
    authDomain:"rubiks-e829c.firebaseapp.com",
    databaseURL:"https://rubiks-e829c-default-rtdb.firebaseio.com",
    projectId:"rubiks-e829c",
    storageBucket:"rubiks-e829c.firebasestorage.app",
    messagingSenderId:"372364043548",
    appId:"1:372364043548:web:92bcea1f0c1f44dd1346d9",
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const cubeRef = ref(db, 'cube-session-v3'); // 새 세션키
  let isSyncing = false;
  let lastPushedTs = 0;

  // 뷰 각도만 빠르게 push (드래그용)
  let viewPushTimer = null;
  function pushView(rx, ry) {
    if (isSyncing) return;
    clearTimeout(viewPushTimer);
    viewPushTimer = setTimeout(() => {
      set(ref(db, 'cube-session-v3/view'), { rx, ry, ts: Date.now(), role: currentRole });
    }, 30); // 30ms throttle
  }

  // 큐브 전체 상태 직렬화
  function getCubeState() {
    return cubies.map(c => ({
      x: c.pos.x, y: c.pos.y, z: c.pos.z,
      cols: c.mesh.material.map(m => m.color.getHex())
    }));
  }

  // Firebase에 상태 push
  function pushState(lastFace, lastDir) {
    if (isSyncing) return;
    lastPushedTs = Date.now();
    set(cubeRef, {
      state: getCubeState(),
      step: currentStep,
      ts: lastPushedTs,
      viewX: baseRotX,
      viewY: baseRotY,
      lastMove: lastFace ? { face: lastFace, dir: lastDir, role: currentRole } : null
    });
  }

  // Firebase에서 상태 수신 → 큐브 재구성
  onValue(cubeRef, snapshot => {
    const data = snapshot.val();
    if (!data || !data.state) return;
    // 내가 방금 push한 것은 무시
    if (data.ts === lastPushedTs) return;

    isSyncing = true;

    // 큐비 전체 재구성
    cubies.forEach(c => cubeGroup.remove(c.mesh));
    cubies = [];
    data.state.forEach(item => {
      const geo = new THREE.BoxGeometry(CUBIE_SIZE, CUBIE_SIZE, CUBIE_SIZE);
      const mats = item.cols.map(hex =>
        new THREE.MeshPhongMaterial({ color: hex, shininess: 60, side: THREE.DoubleSide })
      );
      const mesh = new THREE.Mesh(geo, mats);
      mesh.position.set(item.x * GAP, item.y * GAP, item.z * GAP);
      cubeGroup.add(mesh);
      cubies.push({ mesh, pos: { x: item.x, y: item.y, z: item.z } });
    });

    if (data.step !== undefined) setStep(data.step);

    // 포지션 동기화
    if (data.viewX !== undefined && data.viewY !== undefined) {
      const fx = cubeGroup.rotation.x, fy = cubeGroup.rotation.y;
      baseRotX = data.viewX; baseRotY = data.viewY;
      const tx = baseRotX, ty = baseRotY, t0 = performance.now();
      function step(now) {
        const t = Math.min((now-t0)/350, 1);
        const e = t<0.5 ? 2*t*t : -1+(4-2*t)*t;
        cubeGroup.rotation.x = fx+(tx-fx)*e;
        cubeGroup.rotation.y = fy+(ty-fy)*e;
        if (t<1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // 상대방 조작 버튼 플래시
    if (data.lastMove && data.lastMove.role !== currentRole) {
      flashButton(data.lastMove.face, data.lastMove.dir, data.lastMove.role);
    }

    isSyncing = false;
    document.getElementById('sync-status').textContent = '🟢 연결됨';
    document.getElementById('sync-status').style.color = 'var(--student)';
  });

  // 함수 오버라이드
  const _rf = window.rotateFace;
  window.rotateFace = function(face, dir) {
    _rf(face, dir);
    setTimeout(() => pushState(face, dir), 250);
  };

  const _sc = window.scrambleCube;
  window.scrambleCube = function() {
    _sc();
    setTimeout(() => pushState(), 4500);
  };

  const _re = window.resetCube;
  window.resetCube = function() {
    _re();
    setTimeout(() => pushState(), 100);
  };

  const _undo = window.undoMove;
  window.undoMove = function() {
    _undo();
    setTimeout(() => pushState(), 250);
  };

  const _rv = window.rotateView;
  window.rotateView = function(dy, dx) {
    _rv(dy, dx);
    setTimeout(() => pushState(), 400);
  };

  // 뷰 각도 실시간 수신
  window._pushView = pushView;
  onValue(ref(db, 'cube-session-v3/view'), snapshot => {
    const data = snapshot.val();
    if (!data || isSyncing) return;
    if (data.role === currentRole) return; // 내가 보낸 것 무시
    cubeGroup.rotation.x = data.rx;
    cubeGroup.rotation.y = data.ry;
  });

  // 권한 동기화
  const permRef = ref(db, 'permissions/studentCanOperate');
  window._pushPermission = function(val) { set(permRef, val); };
  onValue(permRef, snapshot => {
    const val = snapshot.val();
    if (val === null) return;
    studentCanOperate = val;
    updatePermissionUI();
    document.getElementById('sync-status').textContent = '🟢 연결됨';
    document.getElementById('sync-status').style.color = 'var(--student)';
  });

  // 초기 상태 push
  setTimeout(() => pushState(), 500);
</script>
</body>
